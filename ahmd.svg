<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="150" cy="120" r="80" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Inner circle with geometric pattern -->
  <circle cx="150" cy="120" r="70" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  
  <!-- Rotating segments -->
  <g transform="translate(150, 120)">
    <!-- Segment 1 -->
    <path d="M 0,-50 Q 35,-35 50,0 Q 35,35 0,50 L 0,0 Z" fill="#d4af37" opacity="0.7"/>
    <!-- Segment 2 -->
    <path d="M 0,-50 Q -35,-35 -50,0 Q -35,35 0,50 L 0,0 Z" fill="#0f3460" opacity="0.8"/>
    <!-- Segment 3 -->
    <path d="M -50,0 Q -35,-35 0,-50 Q 35,-35 50,0 L 0,0 Z" fill="#1a5c8f" opacity="0.7"/>
    <!-- Segment 4 -->
    <path d="M -50,0 Q -35,35 0,50 Q 35,35 50,0 L 0,0 Z" fill="#a8860f" opacity="0.8"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="150" cy="120" r="8" fill="#ffffff"/>
  
  <!-- Text: AHMD -->
  <text x="150" y="210" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#0f3460">ahmd</text>
  
  <!-- Subtitle -->
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#d4af37" letter-spacing="2">PROJECT AND DEVELOPMENT</text>
</svg>